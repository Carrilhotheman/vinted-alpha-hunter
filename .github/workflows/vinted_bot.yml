name: Vinted Alpha Hunter Bot

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

# Prevent two runs from overlapping and racing on seen_items.json.
# A new run triggered while one is active will queue and wait.
concurrency:
  group: vinted-bot
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 12   # never block the queue for more than 12 min

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Vinted Alpha Hunter Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Commit and push seen_items.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_items.json
          if git diff --staged --quiet; then
            echo "No new items found, skipping commit."
          else
            git commit -m "chore: update seen_items.json [skip ci]"
            git pull --rebase origin main
            git push
          fi
